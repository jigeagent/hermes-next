name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling

      - name: Build package
        run: |
          python -m hatchling build
          ls -la dist/

      - name: Publish to PyPI (OIDC trusted publishing or token fallback)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
