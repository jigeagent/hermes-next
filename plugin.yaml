# plugin.yaml — Hermes Agent plugin manifest for Hermes Next
name: hermes-next
version: 0.4.0a0
description: >-
  Next-generation memory provider for Hermes Agent.
  Fuses OpenViking vector storage with MemOS cognitive engine:
  L1 Trace capture → reward backpropagation → L2 Policy induction →
  L3 World Model → Skill crystallization + fusion retrieval (semantic + FTS5 + MMR).

entry_point: hermes_next:register
type: memory
license: AGPL-3.0
homepage: https://github.com/jigeagent/hermes-next

memory_provider: hermes_next:HermesNextProvider

pip_dependencies:
  - openviking>=0.3.22
  - httpx
  - numpy

requires_env:
  - HERMES_NEXT_OV_URL

hooks:
  - initialize
  - prefetch
  - sync_turn
  - get_tool_schemas
  - handle_tool_call
  - on_session_end
  - on_pre_compress
  - on_delegation
  - shutdown
